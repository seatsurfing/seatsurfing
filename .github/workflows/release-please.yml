on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.SEATY_BOT_APP_ID }}
          private-key: ${{ secrets.SEATY_BOT_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ steps.app-token.outputs.token }}
  call-release-workflow:
    if: ${{ needs.release-please.outputs.release_created && startsWith(github.event.head_commit.message, 'chore(main)')  }}
    needs: release-please
    uses: ./.github/workflows/release.yml
    secrets: inherit
