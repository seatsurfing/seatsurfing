syntax = "proto3";

// Host -> plugin RPCs: mirrors the api.SeatsurfingPlugin interface.
//
// IMPORTANT: field numbers must never be renumbered or reused once released.
// Host and plugin(s) are deployed independently, so wire compatibility across
// versions depends entirely on additive changes (new fields get new numbers).
package seatsurfing.plugin.v1;

option go_package = "github.com/seatsurfing/seatsurfing/server/api/pluginpb";

import "common.proto";

service SeatsurfingPluginService {
  // GetBasePath returns the single canonical URL prefix under which all of
  // this plugin's endpoints are nested (e.g. "/cloud-features/"). GetRoutePrefix
  // below still returns the plugin's legacy flat top-level prefixes, which the
  // host keeps mounting alongside the base path for backward compatibility
  // with externally-configured URLs (Stripe webhooks, OAuth redirect URIs,
  // customer SCIM base URLs) that must not break on rollout.
  rpc GetBasePath(seatsurfing.plugin.v1.Empty) returns (BasePathReply);
  rpc GetRoutePrefix(seatsurfing.plugin.v1.Empty) returns (StringListReply);
  rpc GetUnauthorizedRoutes(seatsurfing.plugin.v1.Empty) returns (StringListReply);
  rpc RunSchemaUpdates(seatsurfing.plugin.v1.Empty) returns (seatsurfing.plugin.v1.Empty);
  rpc GetAdminUIMenuItems(seatsurfing.plugin.v1.Empty) returns (AdminUIMenuItemsReply);
  rpc OnTimer(seatsurfing.plugin.v1.Empty) returns (seatsurfing.plugin.v1.Empty);
  // OnInit carries no broker id in gRPC mode - the plugin already knows the
  // host's HostAPI address from its own static config and dials it eagerly
  // at process startup, independent of this call. OnInit must be safe to
  // call more than once: the host re-invokes it on every reconnection.
  rpc OnInit(seatsurfing.plugin.v1.Empty) returns (seatsurfing.plugin.v1.Empty);
  rpc GetAdminWelcomeScreen(seatsurfing.plugin.v1.Empty) returns (AdminWelcomeScreenReply);
  rpc GetPublicSettings(GetPublicSettingsRequest) returns (PluginSettingsReply);
  rpc HandleHTTPRequest(HttpRequest) returns (HttpResponse);
  rpc OnUserCreated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnUserUpdated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnBeforeUserDelete(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnOrganizationCreated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnOrganizationUpdated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnBeforeOrganizationDelete(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnBookingCreated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnBookingUpdated(IdRequest) returns (seatsurfing.plugin.v1.Empty);
  rpc OnBookingDeleted(IdRequest) returns (seatsurfing.plugin.v1.Empty);
}

message IdRequest {
  string id = 1;
}

message StringListReply {
  repeated string values = 1;
}

message BasePathReply {
  string value = 1;
}

message AdminUIMenuItem {
  string id = 1;
  string title = 2;
  // source is the URL of the JS module that registers the plugin's UI as
  // the custom element named by tag_name.
  string source = 3;
  string visibility = 4;
  string icon = 5;
  // tag_name is the custom element tag to mount for this menu item's UI
  // once the JS module at source has been loaded.
  string tag_name = 6;
}

message AdminUIMenuItemsReply {
  repeated AdminUIMenuItem items = 1;
}

message AdminWelcomeScreen {
  // source and tag_name have the same meaning as in AdminUIMenuItem.
  string source = 1;
  string skip_on_setting_true = 2;
  string tag_name = 3;
}

message AdminWelcomeScreenReply {
  bool present = 1;
  AdminWelcomeScreen screen = 2;
}

message GetPublicSettingsRequest {
  string organization_id = 1;
}

message PluginSetting {
  string name = 1;
  string value = 2;
  int32 setting_type = 3; // maps api.SettingType int constants
}

message PluginSettingsReply {
  repeated PluginSetting settings = 1;
}

message HeaderValues {
  repeated string values = 1;
}

message HttpRequest {
  string method = 1;
  string path = 2;
  string raw_query = 3;
  map<string, HeaderValues> headers = 4;
  bytes body = 5;
  string user_id = 6;
}

message HttpResponse {
  int32 status_code = 1;
  map<string, HeaderValues> headers = 2;
  bytes body = 3;
}
